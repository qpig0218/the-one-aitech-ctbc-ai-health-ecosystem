<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" role="img" aria-labelledby="title desc">
  <title id="title">Grant Radar editorial illustration</title>
  <desc id="desc">Hand drawn Japanese magazine style illustration of funding radar, deadlines, industry, school, and AI health dashboard.</desc>
  <defs>
    <filter id="rough">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="2" seed="8"/>
      <feDisplacementMap in="SourceGraphic" scale="2.4"/>
    </filter>
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" seed="4"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
    </filter>
    <radialGradient id="radarGlow" cx="50%" cy="52%" r="52%">
      <stop offset="0%" stop-color="#e6fff5"/>
      <stop offset="54%" stop-color="#70c7bd"/>
      <stop offset="100%" stop-color="#0d6f68"/>
    </radialGradient>
    <linearGradient id="inkWash" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef4ec"/>
    </linearGradient>
  </defs>
